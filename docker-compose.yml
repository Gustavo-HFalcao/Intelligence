services:

  # ── Redis (broker Celery) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - pdf_tmp:/root/.bomtempo_pdfs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - pdf_tmp:/root/.bomtempo_pdfs

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - /etc/letsencrypt/live/34.95.186.98.nip.io/fullchain.pem:/etc/letsencrypt/live/34.95.186.98.nip.io/fullchain.pem:ro
      - /etc/letsencrypt/live/34.95.186.98.nip.io/privkey.pem:/etc/letsencrypt/live/34.95.186.98.nip.io/privkey.pem:ro

volumes:
  redis_data:
  pdf_tmp:
